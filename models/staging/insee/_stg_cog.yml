version: 2

models:
  - name: stg_cog_departement
    description: "Référentiel COG INSEE 2024 — départements. Reprise directe avec TRIM des codes."
    columns:
      - name: dep_code
        description: "Code département (ex. '01', '2A', '976')."
        tests:
          - not_null
          - unique
      - name: reg_code
        description: "Code région de rattachement (ex. '11')."
        tests:
          - not_null
      - name: dep_name
        description: "Libellé officiel."
        tests:
          - not_null

  - name: stg_cog_region
    description: "Référentiel COG INSEE 2024 — régions. Reprise directe avec TRIM des codes."
    columns:
      - name: reg_code
        description: "Code région (ex. '11')."
        tests:
          - not_null
          - unique
      - name: reg_name
        description: "Libellé officiel (ex. 'Ile-de-France')."
        tests:
          - not_null
