version: 2

models:
  - name: stg_insee_population
    description: "Population INSEE par département, genre et tranche d'âge (2022-2025). Pivot inverse format long ; ligne DOM conservée pour DROM."
    columns:
      - name: year
        description: "Année de l'estimation."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [2022, 2023, 2024, 2025]
      - name: dep_code
        description: "Code département (ex. '01', '2A') ou 'DOM' pour l'agrégat outre-mer."
        tests:
          - not_null
      - name: dep_name
        description: "Nom du département. Vide volontairement pour dep_code = 'DOM'."
      - name: gender
        description: "'M' ou 'F'."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['M', 'F']
      - name: age_group_insee
        description: "Tranche d'âge INSEE sans préfixe genre (ex. '20_a_24_ans'). Regroupement 60+ en intermediate."
        tests:
          - not_null
      - name: population
        description: "Effectif estimé pour ce département, genre et tranche d'âge."
        tests:
          - not_null
