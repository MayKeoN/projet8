version: 2

models:
  - name: stg_students
    description: "Inscriptions parcours Data OCR (2022-2025). Genre vide remplacé par 'Non renseigne', filtre parcours Data."
    columns:
      - name: user_id
        description: "Identifiant technique pseudonymisé."
        tests:
          - not_null
      - name: path_category_name
        description: "Toujours 'Data' après filtre staging."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Data']
      - name: age_group
        description: "Tranche d'âge au début du parcours."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - '20-24 ans'
                  - '25-29 ans'
                  - '30-34 ans'
                  - '35-39 ans'
                  - '40-44 ans'
                  - '45-49 ans'
                  - '50-54 ans'
                  - '55-59 ans'
                  - '60 ans ou plus'
      - name: gender
        description: "'Non renseigne' si absent dans la source (~27 % en 2022, en baisse sur la période)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['M', 'F', 'Non renseigne']
      - name: region
        description: "Libellé INSEE ou 'DROM'."
        tests:
          - not_null
      - name: year_path_started
        description: "Année de début du parcours."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [2022, 2023, 2024, 2025]
