version: 2

sources:
  - name: raw
    database: PROJET8
    schema: RAW
    description: "{{ doc('ocr_project__sources_layer') }}"

    tables:
      - name: students_raw
        description: "{{ doc('ocr_source__students_raw') }}"
        columns:
          - name: USER_ID
            description: "Identifiant technique pseudonymisé."
            tests:
              - not_null

      - name: insee_population_raw
        description: "{{ doc('ocr_source__insee_population_raw') }}"
        columns:
          - name: year
            description: "Année de l'estimation (2022-2025)."
            tests:
              - not_null

      - name: cog_departement
        description: "{{ doc('ocr_source__cog_departement') }}"
        columns:
          - name: DEP
            description: "Code département (ex. '01', '2A', '976')."
            tests:
              - not_null

      - name: cog_region
        description: "{{ doc('ocr_source__cog_region') }}"
        columns:
          - name: REG
            description: "Code région INSEE (ex. '11')."
            tests:
              - not_null
