version: 2

sources:
  - name: raw
    database: PROJET8
    schema: RAW
    description: "{{ doc('ocr_project__sources_layer') }}"

    tables:
      - name: students_raw
        description: "{{ doc('ocr_source__students_raw') }}"
        # freshness: null — seeds n'ont pas de colonne timestamp.
        # En production, remplacer par une table avec loaded_at pour activer dbt source freshness.
        columns:
          - name: USER_ID
            description: "Identifiant technique unique de l'etudiant (pseudonymise)."
            tests:
              - not_null

      - name: insee_population_raw
        description: "{{ doc('ocr_source__insee_population_raw') }}"
        columns:
          - name: year
            description: "Annee de l'estimation (2022, 2023, 2024, 2025)."
            tests:
              - not_null

      - name: cog_departement
        description: "{{ doc('ocr_source__cog_departement') }}"
        columns:
          - name: DEP
            description: "Code departement (e.g. '01', '2A', '976')."
            tests:
              - not_null

      - name: cog_region
        description: "{{ doc('ocr_source__cog_region') }}"
        columns:
          - name: REG
            description: "Code region INSEE (e.g. '11' pour Ile-de-France)."
            tests:
              - not_null
