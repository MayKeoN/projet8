version: 2

models:
  - name: int_cog_departement_region
    description: "Table de correspondance géographique dep_code → reg_name. Utilisée par int_insee_by_year_region."
    columns:
      - name: dep_code
        description: "Code département INSEE."
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('stg_cog_departement')
                field: dep_code
      - name: dep_name
        description: "Libellé du département."
        tests:
          - not_null
      - name: reg_code
        description: "Code région INSEE."
        tests:
          - not_null
      - name: reg_name
        description: "Libellé officiel de la région."
        tests:
          - not_null
