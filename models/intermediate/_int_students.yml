version: 2

models:
  - name: int_students_by_year_region
    description: "Effectifs étudiants par année, région, genre et tranche d'âge. 'Non renseigne' conservé ; ligne Total incluse."
    columns:
      - name: year
        description: "Année de début du parcours (2022-2025)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [2022, 2023, 2024, 2025]
      - name: region
        description: "13 régions OC + DROM."
        tests:
          - not_null
      - name: gender
        description: "'M', 'F', 'Non renseigne' ou 'Total'."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['M', 'F', 'Non renseigne', 'Total']
      - name: age_group
        description: "Format OC (ex. '25-29 ans')."
        tests:
          - not_null
      - name: student_count
        description: "Nombre d'étudiants pour ce segment."
        tests:
          - not_null
