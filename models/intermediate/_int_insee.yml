version: 2

models:
  - name: int_insee_by_year_region
    description: "Population INSEE par année, région OC, genre et tranche d'âge. DOM → DROM ; tranches 60+ consolidées ; départements 971-976 exclus."
    columns:
      - name: year
        description: "Année de l'estimation (2022-2025)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [2022, 2023, 2024, 2025]
      - name: region
        description: "Région OC (13 régions métropolitaines + DROM)."
        tests:
          - not_null
      - name: gender
        description: "'M', 'F' ou 'Total' (M + F)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['M', 'F', 'Total']
      - name: age_group_oc
        description: "Format OC (ex. '20-24 ans', '60 ans ou plus')."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - '0-4 ans'
                  - '5-9 ans'
                  - '10-14 ans'
                  - '15-19 ans'
                  - '20-24 ans'
                  - '25-29 ans'
                  - '30-34 ans'
                  - '35-39 ans'
                  - '40-44 ans'
                  - '45-49 ans'
                  - '50-54 ans'
                  - '55-59 ans'
                  - '60 ans ou plus'
      - name: population
        description: "Effectif pour cette combinaison année / région / genre / tranche d'âge."
        tests:
          - not_null
